<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Yoss 🌸</title>
    <!-- Google Fonts elegantes y FontAwesome para iconos de corazones -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@300;500;700&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #090514 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
            padding: 30px 15px;
        }

        /* Fondo de estrellas/brillos flotantes */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Letrero de arriba (Dedicatoria principal) */
        .header-title {
            z-index: 2;
            text-align: center;
            animation: fadeInDown 1.5s ease-out;
            margin-bottom: 10px;
        }

        .header-title h1 {
            font-size: 2.3rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 105, 180, 0.5);
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
        }

        .header-title .line {
            width: 180px;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff69b4, transparent);
            margin: 15px auto 0;
        }

        /* Contenedor de la Flor de Loto */
        .lotus-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            margin: auto;
            filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.4));
        }

        /* Pétalos estilizados */
        .petal {
            position: absolute;
            width: 52px;
            height: 160px;
            background: linear-gradient(to top, rgba(255, 20, 147, 0.9), rgba(255, 192, 203, 0.7));
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            transform-origin: bottom center;
            bottom: 50%;
            mix-blend-mode: screen;
            animation: bloom 5s ease-in-out infinite alternate;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 105, 180, 0.3);
        }

        /* Pistilo brillante en el centro */
        .center {
            position: absolute;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, #fff 10%, #ffeb3b 60%, #ff9800 100%);
            border-radius: 50%;
            bottom: 50%;
            transform: translateY(50%);
            z-index: 10;
            box-shadow: 0 0 30px #ffeb3b, 0 0 10px #fff;
            animation: pulseCenter 2s infinite alternate;
        }

        /* Distribución de los pétalos de la flor */
        .petal:nth-child(1) { transform: rotate(0deg); animation-delay: 0s; }
        .petal:nth-child(2) { transform: rotate(30deg); animation-delay: 0.2s; }
        .petal:nth-child(3) { transform: rotate(60deg); animation-delay: 0.4s; }
        .petal:nth-child(4) { transform: rotate(90deg); animation-delay: 0.6s; }
        .petal:nth-child(5) { transform: rotate(120deg); animation-delay: 0.8s; }
        .petal:nth-child(6) { transform: rotate(150deg); animation-delay: 1s; }
        .petal:nth-child(7) { transform: rotate(180deg); animation-delay: 1.2s; }
        .petal:nth-child(8) { transform: rotate(210deg); animation-delay: 1.4s; }
        .petal:nth-child(9) { transform: rotate(240deg); animation-delay: 1.6s; }
        .petal:nth-child(10) { transform: rotate(270deg); animation-delay: 1.8s; }
        .petal:nth-child(11) { transform: rotate(300deg); animation-delay: 2s; }
        .petal:nth-child(12) { transform: rotate(330deg); animation-delay: 2.2s; }

        /* Contenedor general de gatitos en los laterales */
        .cats-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 3;
        }

        .cat-island {
            position: absolute;
            bottom: 22%;
            width: 110px;
            height: 110px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .cat-left {
            left: 8%;
            animation: floating 4.5s ease-in-out infinite;
        }

        .cat-right {
            right: 8%;
            animation: floating 5s ease-in-out infinite 0.5s;
        }

        .cat-island:hover {
            transform: scale(1.15) translateY(-5px);
        }

        .cat-island:active {
            transform: scale(0.95);
        }

        /* Burbujas de diálogo bonitas para los gatos */
        .cat-bubble {
            position: absolute;
            bottom: 115px;
            background: rgba(255, 255, 255, 0.95);
            color: #2c114d;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Segoe UI', Roboto, sans-serif;
            z-index: 10;
            border: 1.5px solid var(--border-color, #ff69b4);
        }

        .cat-left .cat-bubble {
            left: 0;
            --border-color: #ffcbd5;
        }

        .cat-right .cat-bubble {
            right: 0;
            --border-color: #ff7aa2;
        }

        .cat-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent;
        }

        .cat-left .cat-bubble::after { left: 25px; }
        .cat-right .cat-bubble::after { right: 25px; }

        .cat-island.active .cat-bubble {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Letrero de abajo (Idiomas) */
        .signboard {
            z-index: 2;
            text-align: center;
            min-height: 110px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 122, 162, 0.15);
            width: 90%;
            max-width: 500px;
            margin-bottom: 10px;
        }

        .text {
            font-size: 2.3rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 105, 180, 0.4);
            transition: opacity 0.4s ease, transform 0.4s ease;
            font-family: 'Playfair Display', serif;
        }

        .subtext {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #e0b0ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: opacity 0.4s ease;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 500;
        }

        @keyframes bloom {
            0% {
                height: 50px;
                opacity: 0.3;
                transform: rotate(var(--rotation)) scale(0.8);
            }
            100% {
                height: 160px;
                opacity: 0.95;
            }
        }

        @keyframes pulseCenter {
            0% { transform: translateY(50%) scale(0.9); box-shadow: 0 0 20px #ffeb3b; }
            100% { transform: translateY(50%) scale(1.15); box-shadow: 0 0 35px #ffeb3b, 0 0 15px #fff; }
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1.5deg); }
        }

        /* Corazones dinámicos lanzados por los gatos */
        .love-heart {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            color: #ff69b4;
            text-shadow: 0 0 8px rgba(255,105,180,0.6);
            animation: floatUp 1.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr));
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            .header-title h1 {
                font-size: 1.8rem;
            }
            .lotus-container {
                width: 220px;
                height: 220px;
            }
            .petal {
                height: 125px;
                width: 42px;
            }
            @keyframes bloom {
                0% { height: 40px; transform: rotate(var(--rotation)) scale(0.8); }
                100% { height: 125px; }
            }
            .cat-island {
                bottom: 12%;
                width: 85px;
                height: 85px;
            }
            .cat-left { left: 4%; }
            .cat-right { right: 4%; }
            .cat-bubble { bottom: 90px; font-size: 0.75rem; }
            .text {
                font-size: 1.8rem;
            }
            .signboard {
                min-height: 100px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Brillos de fondo -->
    <canvas class="stars" id="starsCanvas"></canvas>

    <!-- LETRERO DE ARRIBA -->
    <div class="header-title">
        <h1>PARA MI LINDA CHICA: YOSS (JRV)</h1>
        <div class="line"></div>
    </div>

    <!-- FLOR DE LOTO CENTRAL -->
    <div class="lotus-container">
        <!-- 12 Pétalos con sus rotaciones inline para que la animación funcione perfecto -->
        <div class="petal" style="--rotation: 0deg;"></div>
        <div class="petal" style="--rotation: 30deg;"></div>
        <div class="petal" style="--rotation: 60deg;"></div>
        <div class="petal" style="--rotation: 90deg;"></div>
        <div class="petal" style="--rotation: 120deg;"></div>
        <div class="petal" style="--rotation: 150deg;"></div>
        <div class="petal" style="--rotation: 180deg;"></div>
        <div class="petal" style="--rotation: 210deg;"></div>
        <div class="petal" style="--rotation: 240deg;"></div>
        <div class="petal" style="--rotation: 270deg;"></div>
        <div class="petal" style="--rotation: 300deg;"></div>
        <div class="petal" style="--rotation: 330deg;"></div>
        <div class="center"></div>
    </div>

    <!-- CAPA DE GATITOS FLOTANTES INTERACTIVOS (B&W) -->
    <div class="cats-wrapper">
        
        <!-- GATITO BLANCO (Izquierda) -->
        <div class="cat-island cat-left" id="white-cat">
            <div class="cat-bubble" id="white-cat-bubble">¡Miau! Te amo Yoss 🌸</div>
            <!-- SVG de gatito blanco durmiendo en hoja de loto -->
            <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Hoja de Loto verde de base -->
                <ellipse cx="50" cy="75" rx="42" ry="14" fill="#1b4d3e" opacity="0.85"/>
                <path d="M50,75 C25,75 15,70 12,68 C20,78 80,78 88,68" stroke="#103328" stroke-width="1.5" fill="none" opacity="0.6"/>
                <!-- Cuerpo del Gato Blanco enrollado -->
                <g id="body-white" transform="translate(15, 25)">
                    <!-- Cola -->
                    <path d="M55,35 Q65,33 63,22" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none"/>
                    <path d="M55,35 Q65,33 63,22" stroke="#ffcbd5" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
                    <!-- Cuerpo -->
                    <ellipse cx="32" cy="33" rx="22" ry="16" fill="#ffffff" stroke="#ffcbd5" stroke-width="0.5"/>
                    <path d="M15,31 Q20,24 28,26" fill="#f0f0f0" opacity="0.5"/>
                    <!-- Cabeza -->
                    <circle cx="18" cy="24" r="13" fill="#ffffff"/>
                    <!-- Orejas -->
                    <polygon points="8,15 13,6 16,17" fill="#ffccd5"/>
                    <polygon points="8,15 13,6 16,17" fill="#ffffff" transform="scale(0.9) translate(1, 2)"/>
                    <polygon points="19,15 24,6 27,17" fill="#ffccd5"/>
                    <polygon points="19,15 24,6 27,17" fill="#ffffff" transform="scale(0.9) translate(2, 2)"/>
                    <!-- Ojos cerrados durmiendo -->
                    <path d="M11,26 Q13,28 15,26" stroke="#5c4033" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <path d="M20,26 Q22,28 24,26" stroke="#5c4033" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <!-- Naricita rosa -->
                    <polygon points="17,28 18,30 19,28" fill="#ff9ebb"/>
                </g>
            </svg>
        </div>

        <!-- GATITO NEGRO (Derecha) -->
        <div class="cat-island cat-right" id="black-cat">
            <div class="cat-bubble" id="black-cat-bubble">¡Prrr! Eres hermosa Yoss ✨</div>
            <!-- SVG de gatito negro durmiendo en hoja de loto -->
            <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Hoja de Loto verde de base -->
                <ellipse cx="50" cy="75" rx="42" ry="14" fill="#1b4d3e" opacity="0.85"/>
                <path d="M50,75 C25,75 15,70 12,68 C20,78 80,78 88,68" stroke="#103328" stroke-width="1.5" fill="none" opacity="0.6"/>
                <!-- Cuerpo del Gato Negro enrollado -->
                <g id="body-black" transform="translate(15, 25)">
                    <!-- Cola -->
                    <path d="M55,35 Q65,33 63,22" stroke="#1a162b" stroke-width="6" stroke-linecap="round" fill="none"/>
                    <!-- Cuerpo -->
                    <ellipse cx="32" cy="33" rx="22" ry="16" fill="#1a162b"/>
                    <!-- Cabeza -->
                    <circle cx="18" cy="24" r="13" fill="#1a162b"/>
                    <!-- Orejas con centro rosa -->
                    <polygon points="8,15 13,6 16,17" fill="#1a162b"/>
                    <polygon points="9,14 12,8 14,15" fill="#ffcbd5"/>
                    <polygon points="19,15 24,6 27,17" fill="#1a162b"/>
                    <polygon points="20,14 23,8 25,15" fill="#ffcbd5"/>
                    <!-- Ojos cerrados durmiendo (dorados/blancos sutiles) -->
                    <path d="M11,26 Q13,28 15,26" stroke="#ffeb3b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <path d="M20,26 Q22,28 24,26" stroke="#ffeb3b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <!-- Naricita rosa -->
                    <polygon points="17,28 18,30 19,28" fill="#ff9ebb"/>
                </g>
            </svg>
        </div>

    </div>

    <!-- LETRERO DE ABAJO (IDIOMAS MULTIPLES) -->
    <div class="signboard">
        <div class="text" id="love-text">Te Amo</div>
        <div class="subtext" id="lang-text">Español</div>
    </div>

    <script>
        // Lógica para alternar 10 idiomas diferentes en el letrero inferior
        const phrases = [
            { text: "Te Amo", lang: "Español" },
            { text: "I Love You", lang: "Inglés" },
            { text: "我爱你", lang: "Chino (Wǒ ài nǐ)" },
            { text: "愛してる", lang: "Japonés (Aishiteru)" },
            { text: "Je t'aime", lang: "Francés" },
            { text: "Ti amo", lang: "Italiano" },
            { text: "Eu te amo", lang: "Portugués" },
            { text: "사랑해", lang: "Coreano (Saranghae)" },
            { text: "Ich liebe dich", lang: "Alemán" },
            { text: "Я тебя люблю", lang: "Ruso (Ya tebya lyublyu)" }
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('love-text');
        const langElement = document.getElementById('lang-text');

        setInterval(() => {
            currentIndex = (currentIndex + 1) % phrases.length;
            
            textElement.style.opacity = 0;
            textElement.style.transform = "scale(0.95)";
            langElement.style.opacity = 0;
            
            setTimeout(() => {
                textElement.textContent = phrases[currentIndex].text;
                
                // Cambiar tipografías especiales dependiendo del idioma para estética oriental
                if (phrases[currentIndex].lang.includes("Chino") || phrases[currentIndex].lang.includes("Japonés")) {
                    textElement.style.fontFamily = "'Noto Serif SC', 'Noto Serif JP', serif";
                } else if (phrases[currentIndex].lang.includes("Coreano")) {
                    textElement.style.fontFamily = "sans-serif";
                } else {
                    textElement.style.fontFamily = "'Playfair Display', Georgia, serif";
                }

                langElement.textContent = phrases[currentIndex].lang;
                textElement.style.opacity = 1;
                textElement.style.transform = "scale(1)";
                langElement.style.opacity = 1;
            }, 400);

        }, 3000);

        // Crear partículas/estrellas flotantes de fondo de forma rápida con Canvas
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = Array.from({ length: 60 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.4 + 0.15,
            alpha: Math.random() * 0.6 + 0.4
        }));

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 192, 203, ${p.alpha})`; // Brillos sutiles rosados
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.y -= p.speed;
                if (p.y < 0) {
                    p.y = height;
                    p.x = Math.random() * width;
                }
            });
            
            requestAnimationFrame(animate);
        }
        animate();

        /* --- LÓGICA E INTERACCIONES DE LOS GATITOS --- */
        const whiteCat = document.getElementById('white-cat');
        const blackCat = document.getElementById('black-cat');

        const catPhrases = {
            white: [
                "¡Miau! Yoss es la niña de tus ojos 💕",
                "🐾 *Miau* ¡Ella te ama infinitamente!",
                "🌸 ¡Yoss es la chica más linda!",
                "✨ Eres única y especial para él, Yoss",
                "🐱 *Miau miau* ¡Mucho amor para ti hoy!"
            ],
            black: [
                "¡Prrr! Eres su persona favorita, Yoss 💖",
                "🐾 *Prrr* ¡Eres preciosa!",
                "✨ ¡Él siempre piensa en ti, Yoss!",
                "🐱 Un ronroneo especial para ti...",
                "❤️ ¡Te amamos de aquí al infinito!"
            ]
        };

        let whiteTimeout;
        let blackTimeout;

        function triggerCatReaction(catElement, bubbleId, phrasesList, isLeft) {
            // Mostrar diálogo
            const bubble = document.getElementById(bubbleId);
            const randomPhrase = phrasesList[Math.floor(Math.random() * phrasesList.length)];
            bubble.textContent = randomPhrase;
            
            catElement.classList.add('active');

            // Lanzar ráfagas de corazones flotantes
            const rect = catElement.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 3;
            
            createHeartExplosion(startX, startY);

            // Cerrar burbuja automáticamente tras 3.5 segundos
            if (isLeft) {
                clearTimeout(whiteTimeout);
                whiteTimeout = setTimeout(() => catElement.classList.remove('active'), 3500);
            } else {
                clearTimeout(blackTimeout);
                blackTimeout = setTimeout(() => catElement.classList.remove('active'), 3500);
            }
        }

        whiteCat.addEventListener('click', () => {
            triggerCatReaction(whiteCat, 'white-cat-bubble', catPhrases.white, true);
        });

        blackCat.addEventListener('click', () => {
            triggerCatReaction(blackCat, 'black-cat-bubble', catPhrases.black, false);
        });

        // Generar corazones flotantes dinámicos
        function createHeartExplosion(startX, startY) {
            const colors = ['#ff69b4', '#ffccd5', '#ff1493', '#e0b0ff', '#ffffff'];
            
            for(let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.classList.add('love-heart');
                heart.innerHTML = '<i class="fa-solid fa-heart"></i>';
                
                // Posicionar corazón en la coordenada de click
                heart.style.left = startX + 'px';
                heart.style.top = startY + 'px';
                
                // Variantes aleatorias de tamaño y dirección de flotado
                const size = Math.random() * 12 + 14;
                heart.style.fontSize = size + 'px';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Variables de animación CSS personalizadas
                const tx = (Math.random() * 120 - 60) + 'px';
                const ty = -(Math.random() * 100 + 80) + 'px';
                const tr = (Math.random() * 360) + 'deg';
                
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                heart.style.setProperty('--tr', tr);
                
                document.body.appendChild(heart);
                
                // Remover el elemento del DOM al terminar la animación
                setTimeout(() => heart.remove(), 1800);
            }
        }
    </script>
</body>
</html>
